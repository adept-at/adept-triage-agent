# Example using workflow_run trigger (alternative to repository_dispatch)
# Use this when you want automatic triage after any run of a named workflow fails.
# No dispatch action needed — GitHub fires this automatically when the named workflow completes.

name: Example - Triage Failed Workflows

on:
  workflow_run:
    workflows: ["Your Test Workflow Name"]
    types:
      - completed

permissions:
  contents: write
  actions: read

jobs:
  triage:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    uses: adept-at/adept-common/.github/workflows/triage-failed-tests.yml@main
    with:
      workflow-run-id: ${{ github.event.workflow_run.id }}
      job-name: ${{ github.event.workflow_run.name }}
      branch: ${{ github.event.workflow_run.head_branch }}
      commit-sha: ${{ github.event.workflow_run.head_sha }}
      repository: ${{ github.event.workflow_run.head_repository.full_name }}
      test-frameworks: 'cypress'
    secrets:
      CROSS_REPO_PAT: ${{ secrets.CROSS_REPO_PAT }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
