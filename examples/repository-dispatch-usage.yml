# Example showing the two-workflow architecture using shared actions
# This is the RECOMMENDED pattern for integrating the Adept Triage Agent.

# FILE 1: .github/workflows/cypress-tests.yml
# Your test workflow — triggers triage on failure using the shared dispatch action
name: Cypress E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  cypress:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        containers: [auth.cy.ts, dashboard.cy.ts, settings.cy.ts]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress tests
        run: npx cypress run --spec cypress/e2e/${{ matrix.containers }}
        env:
          CYPRESS_BASE_URL: ${{ vars.CYPRESS_BASE_URL }}

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-artifacts-${{ matrix.containers }}-${{ github.run_id }}
          path: |
            cypress/screenshots/**
            cypress/videos/**

      - name: Trigger triage analysis
        if: failure()
        continue-on-error: true
        uses: adept-at/adept-common/.github/actions/triage-dispatch@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          job-name: ${{ github.job }} (${{ matrix.containers }})
          spec: ${{ matrix.containers }}
          pr-number: ${{ github.event.pull_request.number || '' }}
          commit-sha: ${{ github.event.pull_request.head.sha || github.sha }}
          branch: ${{ github.head_ref || github.ref_name }}

---

# FILE 2: .github/workflows/triage-failed-tests.yml
# Thin wrapper that calls the shared reusable triage workflow
name: Triage Failed Tests

on:
  repository_dispatch:
    types: [triage-failed-test]

permissions:
  contents: write
  actions: read

jobs:
  triage:
    uses: adept-at/adept-common/.github/workflows/triage-failed-tests.yml@main
    with:
      workflow-run-id: ${{ github.event.client_payload.workflow_run_id }}
      job-name: ${{ github.event.client_payload.job_name }}
      spec: ${{ github.event.client_payload.spec }}
      pr-number: ${{ github.event.client_payload.pr_number }}
      commit-sha: ${{ github.event.client_payload.commit_sha }}
      branch: ${{ github.event.client_payload.branch }}
      repository: ${{ github.event.client_payload.repo_url }}
      preview-url: ${{ github.event.client_payload.preview_url }}
      test-frameworks: 'cypress'
    secrets:
      CROSS_REPO_PAT: ${{ secrets.CROSS_REPO_PAT }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
