name: 'Adept Triage Agent'
description: 'AI-powered test failure triage to determine if failures are test or product issues'
author: 'Adept'
branding:
  icon: 'search'
  color: 'blue'

inputs:
  GITHUB_TOKEN:
    description: 'GitHub token for API access. Use a PAT or app token when REPOSITORY or AUTO_FIX_TARGET_REPO points to a different repo.'
    required: false
    default: ${{ github.token }}
  OPENAI_API_KEY:
    description: 'OpenAI API key for AI analysis'
    required: true
  ERROR_MESSAGE:
    description: 'Error message to analyze (optional if using workflow artifacts)'
    required: false
  WORKFLOW_RUN_ID:
    description: 'Workflow run ID to fetch logs from'
    required: false
  JOB_NAME:
    description: 'Specific job name to analyze'
    required: false
  CONFIDENCE_THRESHOLD:
    description: 'Minimum confidence level for verdict (0-100)'
    required: false
    default: '70'
  PR_NUMBER:
    description: 'Pull request number to fetch diff from'
    required: false
  COMMIT_SHA:
    description: 'Commit SHA associated with the test failure'
    required: false
  BRANCH:
    description: 'Branch being tested (used to fetch branch diff when no PR number available)'
    required: false
  REPOSITORY:
    description: 'App/source repository in owner/repo format for PR, branch, or commit diff lookup. Workflow runs and artifacts are still read from the repo where this action executes.'
    required: false
    default: ${{ github.repository }}
  TEST_FRAMEWORKS:
    description: 'Test framework: "cypress" or "webdriverio".'
    required: false
    default: 'cypress'
  ENABLE_AUTO_FIX:
    description: 'Enable automatic branch creation with fix. Consumer opts in by setting this to true.'
    required: false
    default: 'false'
  AUTO_FIX_BASE_BRANCH:
    description: 'Base branch to create fix branch from'
    required: false
    default: 'main'
  AUTO_FIX_MIN_CONFIDENCE:
    description: 'Minimum fix confidence required to apply auto-fix (0-100)'
    required: false
    default: '70'
  AUTO_FIX_TARGET_REPO:
    description: 'Repository where repair source files are fetched and fix branches are created (owner/repo format). Use this when test code lives in a different repo than REPOSITORY.'
    required: false
    default: ${{ github.repository }}
  ENABLE_VALIDATION:
    description: 'Enable validation of auto-fixes before accepting them. Validation runs remotely by default (dispatches VALIDATION_WORKFLOW with VALIDATION_TEST_COMMAND). Set ENABLE_LOCAL_VALIDATION=true to run validation in-container instead.'
    required: false
    default: 'false'
  ENABLE_LOCAL_VALIDATION:
    description: 'When true with ENABLE_AUTO_FIX, ENABLE_VALIDATION, and VALIDATION_TEST_COMMAND, runs the validation test locally in-container (clone, apply, test, push + PR only on pass, up to 3 iterations). When false (default), validation is dispatched to VALIDATION_WORKFLOW remotely.'
    required: false
    default: 'false'
  VALIDATION_WORKFLOW:
    description: 'Name of the validation workflow file (e.g., validate-fix.yml). Used by the remote validation path when ENABLE_LOCAL_VALIDATION is false.'
    required: false
    default: 'validate-fix.yml'
  VALIDATION_PREVIEW_URL:
    description: 'Preview URL for validation tests (if different from original). Replaces {url} in VALIDATION_TEST_COMMAND.'
    required: false
  VALIDATION_SPEC:
    description: 'Spec file for validation tests (if different from detected). Replaces {spec} in VALIDATION_TEST_COMMAND.'
    required: false
  VALIDATION_TEST_COMMAND:
    description: 'Test command template with {spec} and {url} placeholders. Used by BOTH validation paths — passed to the remote VALIDATION_WORKFLOW via workflow_dispatch, or evaluated locally when ENABLE_LOCAL_VALIDATION=true. Example: npx wdio run wdio.conf.ts --spec {spec} -t sauce'
    required: false
  NPM_TOKEN:
    description: 'Token for npm registry auth (e.g., GitHub Packages read token). Falls back to GITHUB_TOKEN when not set.'
    required: false
  ENABLE_AGENTIC_REPAIR:
    description: 'Enable multi-agent repair pipeline for higher quality fixes (uses more API calls but produces better results). Enabled by default; set to false to disable.'
    required: false
    default: 'true'
  PRODUCT_REPO:
    description: 'Product repository (owner/repo). All browser-test repos target the same frontend. Used for fetching recent product commits and PR diffs.'
    required: false
    default: 'adept-at/learn-webapp'
  PRODUCT_DIFF_COMMITS:
    description: 'Number of recent product commits to include in the diff context (default: 5)'
    required: false
    default: '5'
  TRIAGE_AWS_REGION:
    description: 'AWS region for DynamoDB skill store.'
    required: false
    default: 'us-east-1'
  TRIAGE_DYNAMO_TABLE:
    description: 'DynamoDB table name for skill store.'
    required: false
    default: 'triage-skills-v1-live'
  MODEL_OVERRIDE_FIX_GEN:
    description: >
      Optional override for the fix-generation agent model. When set
      (e.g. "gpt-5.3-codex"), fix-gen reverts to this model without
      requiring a new release. Reasoning effort automatically resets
      to 'none' when the override is not a 5.4-class model.
    required: false
    default: ''
  MODEL_OVERRIDE_REVIEW:
    description: >
      Optional override for the review agent model. Same rollback
      mechanism as MODEL_OVERRIDE_FIX_GEN, independent. Effort
      auto-resets the same way.
    required: false
    default: ''

outputs:
  verdict:
    description: 'Classification result: TEST_ISSUE, PRODUCT_ISSUE, INCONCLUSIVE, PENDING, ERROR, or NO_FAILURE'
  confidence:
    description: 'Confidence score (0-100)'
  reasoning:
    description: 'Detailed explanation of the decision'
  summary:
    description: 'Brief summary for PR comments'
  triage_json:
    description: 'Complete triage analysis as JSON string'
  has_fix_recommendation:
    description: 'Boolean indicating if a fix recommendation was generated (TEST_ISSUE only)'
  fix_recommendation:
    description: 'Complete fix recommendation as JSON (when available)'
  fix_summary:
    description: 'Human-readable fix recommendation summary (when available)'
  fix_confidence:
    description: 'Confidence score for the fix recommendation (0-100)'
  auto_fix_applied:
    description: 'Whether auto-fix branch was created (true/false)'
  auto_fix_branch:
    description: 'Name of the created branch (if auto-fix applied)'
  auto_fix_commit:
    description: 'Last commit SHA created while applying the fix (if auto-fix applied)'
  auto_fix_files:
    description: 'JSON array of modified files (if auto-fix applied)'
  validation_run_id:
    description: 'Workflow run ID of the validation workflow (legacy remote validation path only)'
  validation_status:
    description: 'Validation status: passed (local test succeeded), pending, or skipped'
  validation_url:
    description: 'URL to the validation workflow run (legacy remote validation path only)'
  auto_fix_skipped:
    description: 'Whether auto-fix was intentionally withheld (true/false). Set to true when the agent decides not to apply a fix despite a TEST_ISSUE verdict — typically because the spec is chronically flaky and needs human investigation rather than another fallback fix. Verdict/confidence/reasoning still reflect the honest classification; only the auto-fix step is skipped.'
  auto_fix_skipped_reason:
    description: 'Human-readable reason when auto_fix_skipped is true (e.g., chronic flakiness message, recommendation for human follow-up).'

runs:
  using: 'node24'
  main: 'dist/index.js' 